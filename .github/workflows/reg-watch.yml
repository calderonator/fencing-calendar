name: Registration Watch

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger from the Actions tab

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Check for newly-opened registrations
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          PUSH_ENDPOINT: ${{ secrets.PUSH_ENDPOINT }}
        run: python scripts/reg_monitor.py

      - name: Commit reg_state.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reg_state.json
          if git diff --staged --quiet; then
            echo "No new registration alerts."
          else
            git commit -m "Registration alert state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
